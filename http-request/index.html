<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP 请求 - Workbench</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components/tool-layout.css">
  <link rel="stylesheet" href="../assets/css/components/buttons.css">
  <link rel="stylesheet" href="../assets/css/components/toolbar.css">
  <link rel="stylesheet" href="../assets/css/components/editor.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tool-container">
    <header class="tool-header">
      <h1>HTTP 请求</h1>
      <p class="tool-description">构建并发送 HTTP 请求，生成 curl / Python / Java 代码</p>
    </header>

    <main class="tool-main">
      <!-- 请求栏 -->
      <div class="http-request-bar">
        <select class="http-method" id="http-method">
          <option value="GET" selected>GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="DELETE">DELETE</option>
          <option value="PATCH">PATCH></option>
          <option value="HEAD">HEAD</option>
          <option value="OPTIONS">OPTIONS</option>
        </select>
        <input type="text" class="http-url" id="http-url" placeholder="https://api.example.com/users" autocomplete="off" spellcheck="false">
        <button class="btn btn-primary" data-action="send">发送</button>
        <button class="btn btn-secondary" data-action="clear">清空</button>
      </div>

      <div class="http-config">
        <!-- Headers -->
        <div class="http-config-section">
          <div class="http-config-header">
            <span class="http-config-title">请求头 Headers</span>
            <button class="btn btn-sm btn-secondary" data-action="add-header">+ 添加</button>
          </div>
          <div class="http-kv-list" id="header-list">
            <div class="http-kv-row">
              <input type="text" class="http-kv-key" placeholder="Key" value="Content-Type">
              <input type="text" class="http-kv-val" placeholder="Value" value="application/json">
              <button class="http-kv-del" data-action="del-header">&times;</button>
            </div>
          </div>
        </div>

        <!-- Body -->
        <div class="http-config-section">
          <div class="http-config-header">
            <span class="http-config-title">请求体 Body</span>
            <select class="http-body-type" id="body-type">
              <option value="none">无</option>
              <option value="raw" selected>Raw (JSON)</option>
              <option value="form">Form Data</option>
            </select>
          </div>
          <div class="http-body-area" id="body-raw-wrapper">
            <textarea class="editor" id="body-raw" placeholder='{ "key": "value" }'></textarea>
          </div>
          <div class="http-body-area u-hidden" id="body-form-wrapper">
            <div class="http-kv-list" id="form-list">
              <div class="http-kv-row">
                <input type="text" class="http-kv-key" placeholder="Key">
                <input type="text" class="http-kv-val" placeholder="Value">
                <button class="http-kv-del" data-action="del-form">&times;</button>
              </div>
            </div>
            <button class="btn btn-sm btn-secondary" data-action="add-form">+ 添加</button>
          </div>
          <div class="http-body-area u-hidden" id="body-none-wrapper">
            <div class="placeholder">当前请求无 Body</div>
          </div>
        </div>
      </div>

      <div class="editor-container http-result-container">
        <!-- 响应结果 -->
        <div class="editor-wrapper">
          <div class="editor-header">
            <span class="editor-title">响应结果</span>
            <span class="editor-info" id="http-status">未发送</span>
          </div>
          <div class="editor-body editor-output" id="http-response">
            <div class="placeholder">点击「发送」发起请求…</div>
          </div>
        </div>

        <!-- 生成代码 -->
        <div class="editor-wrapper">
          <div class="editor-header">
            <span class="editor-title">生成代码</span>
            <div class="editor-header-actions">
              <button class="btn btn-sm btn-secondary is-active" data-code="curl">curl</button>
              <button class="btn btn-sm btn-secondary" data-code="python">Python</button>
              <button class="btn btn-sm btn-secondary" data-code="java">Java</button>
              <button class="btn btn-sm btn-secondary" data-action="copy-code">复制</button>
            </div>
          </div>
          <div class="editor-body editor-output" id="code-result">
            <pre class="http-code"><code>curl -X GET "https://api.example.com/users"</code></pre>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="manifest.js"></script>
  <script src="core.js"></script>
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workbench - 开发者工作台</title>
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/index.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar" aria-label="主导航">
      <div class="sidebar-header">
        <div class="sidebar-header-text">
          <div class="sidebar-title">Workbench</div>
          <div class="sidebar-subtitle">开发者工作台</div>
        </div>
        <button class="sidebar-collapse-btn" type="button" id="sidebar-collapse-btn" title="收起侧边栏">◂</button>
      </div>

      <nav class="menu">
        <button class="menu-item" type="button" data-nav="links">
          <span class="menu-icon" aria-hidden="true">🔗</span>
          <span class="menu-text">常用链接</span>
        </button>

        <button class="menu-item" type="button" data-nav="notepad">
          <span class="menu-icon" aria-hidden="true">📒</span>
          <span class="menu-text">备忘录</span>
        </button>

        <button class="menu-item" type="button" data-nav="workflow">
          <span class="menu-icon" aria-hidden="true">⚡</span>
          <span class="menu-text">工作流编排</span>
        </button>

        <div class="menu-group is-collapsed">
          <button class="menu-item menu-item-group" type="button" data-toggle="toolbox" aria-expanded="false">
            <span class="menu-icon" aria-hidden="true">🧰</span>
            <span class="menu-text">工具箱</span>
            <span class="menu-caret" aria-hidden="true">▾</span>
          </button>
          <div class="menu-sub" data-group="toolbox">
            <button class="menu-item menu-sub-item" type="button" data-nav="json">
              <span class="menu-icon" aria-hidden="true">📝</span>
              <span class="menu-text">JSON 工具</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="file-generator">
              <span class="menu-icon" aria-hidden="true">📄</span>
              <span class="menu-text">文件生成器</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="image-generator">
              <span class="menu-icon" aria-hidden="true">🖼️</span>
              <span class="menu-text">图片生成器</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="properties-yaml">
              <span class="menu-icon" aria-hidden="true">⚙️</span>
              <span class="menu-text">Properties ↔ YAML</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="svg-editor">
              <span class="menu-icon" aria-hidden="true">🧩</span>
              <span class="menu-text">SVG 编辑器</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="md5">
              <span class="menu-icon" aria-hidden="true">#️⃣</span>
              <span class="menu-text">MD5 计算</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="base64">
              <span class="menu-icon" aria-hidden="true">🔐</span>
              <span class="menu-text">Base64 编解码</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="qrcode">
              <span class="menu-icon" aria-hidden="true">📱</span>
              <span class="menu-text">二维码工具</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="timestamp">
              <span class="menu-icon" aria-hidden="true">🕐</span>
              <span class="menu-text">时间戳转换</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="cron">
              <span class="menu-icon" aria-hidden="true">⏰</span>
              <span class="menu-text">Cron 表达式</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="url">
              <span class="menu-icon" aria-hidden="true">🔗</span>
              <span class="menu-text">URL 编解码</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="jwt">
              <span class="menu-icon" aria-hidden="true">🎫</span>
              <span class="menu-text">JWT 解码</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="uuid">
              <span class="menu-icon" aria-hidden="true">🆔</span>
              <span class="menu-text">UUID 生成器</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="regex">
              <span class="menu-icon" aria-hidden="true">🔍</span>
              <span class="menu-text">正则测试</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="diff">
              <span class="menu-icon" aria-hidden="true">🔄</span>
              <span class="menu-text">文本对比</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="json-to-struct">
              <span class="menu-icon" aria-hidden="true">📦</span>
              <span class="menu-text">JSON 转 Struct</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="http-request">
              <span class="menu-icon" aria-hidden="true">🌐</span>
              <span class="menu-text">HTTP 请求</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="password-generator">
              <span class="menu-icon" aria-hidden="true">🔑</span>
              <span class="menu-text">密码生成器</span>
            </button>
            <button class="menu-item menu-sub-item" type="button" data-nav="unicode">
              <span class="menu-icon" aria-hidden="true">🔤</span>
              <span class="menu-text">Unicode 编解码</span>
            </button>
          </div>
        </div>
      </nav>

      <footer class="sidebar-footer">
        <div class="sidebar-footer-text">&copy; 2026 持续更新中…</div>
      </footer>
    </aside>

    <main class="content" aria-label="内容区">
      <div class="global-search" id="global-search">
        <div class="global-search-input-wrap">
          <svg class="global-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="global-search-input" class="global-search-input" placeholder="搜索工具、链接、备忘…" autocomplete="off">
          <kbd class="global-search-kbd" id="global-search-kbd">Ctrl+K</kbd>
          <button type="button" class="global-search-clear" id="global-search-clear" title="清空搜索" style="display:none;">×</button>
        </div>
        <div class="global-search-results" id="global-search-results"></div>
      </div>
      <iframe
        id="module-frame"
        class="module-frame"
        title="模块内容"
        src="./links/index.html"
        loading="lazy"
      ></iframe>
    </main>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/index.js"></script>
</body>
</html>

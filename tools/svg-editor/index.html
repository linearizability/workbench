<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG 编辑器 - Workbench</title>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components/tool-layout.css">
  <link rel="stylesheet" href="../../assets/css/components/buttons.css">
  <link rel="stylesheet" href="../../assets/css/components/toolbar.css">
  <link rel="stylesheet" href="../../assets/css/components/card.css">
  <link rel="stylesheet" href="../../assets/css/components/editor.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tool-container">
    <header class="tool-header">
      <h1>SVG 编辑器</h1>
      <p class="tool-description">上传/粘贴 SVG，展示源码；编辑源码，预览实时更新（iframe sandbox 渲染）</p>
    </header>

    <main class="tool-main">
      <div class="toolbar">
        <div class="toolbar-group">
          <input type="file" id="file-input" accept=".svg,image/svg+xml" class="u-hidden">
          <button class="btn btn-primary" data-action="upload">上传 SVG</button>
          <button class="btn btn-secondary" data-action="paste">从剪贴板读取</button>
          <button class="btn btn-secondary" data-action="clear">清空</button>
        </div>

        <div class="toolbar-group">
          <label class="field">
            <span class="field-label">预览背景</span>
            <input id="preview-bg" class="field-input field-color" type="color" value="#ffffff">
          </label>
          <button class="btn btn-secondary" data-action="copy">复制源码</button>
          <button class="btn btn-secondary" data-action="download">下载 SVG</button>
        </div>
      </div>

      <div class="editor-container svg-editor-layout">
        <div class="editor-wrapper">
          <div class="editor-header">
            <span class="editor-title">SVG 源码</span>
            <span class="editor-info" id="input-info">0 字符</span>
          </div>
          <div class="editor-body">
            <textarea id="input-editor" class="editor" placeholder="粘贴 SVG XML 源码，或使用上传/剪贴板读取..."></textarea>
          </div>
        </div>

        <div class="preview-panel">
          <div class="preview-header">
            <div class="preview-title">预览</div>
            <div class="preview-meta">
              <span id="status" class="status">等待输入</span>
            </div>
          </div>
          <div class="preview-body">
            <iframe
              id="preview-frame"
              class="preview-frame"
              title="SVG 预览"
              sandbox=""
              referrerpolicy="no-referrer"
            ></iframe>
            <div id="preview-placeholder" class="preview-placeholder">
              粘贴/上传 SVG 后，将在这里预览
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="tool-footer">
      <p>提示：若剪贴板里是 PNG 等位图，无法还原原始 SVG 源码；请粘贴 SVG 文本或复制 SVG 文件</p>
    </footer>
  </div>

  <script src="../../assets/js/utils.js"></script>
  <script src="app.js"></script>
</body>
</html>

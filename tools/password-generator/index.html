<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成器 - Workbench</title>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components/tool-layout.css">
  <link rel="stylesheet" href="../../assets/css/components/buttons.css">
  <link rel="stylesheet" href="../../assets/css/components/toolbar.css">
  <link rel="stylesheet" href="../../assets/css/components/editor.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tool-container">
    <header class="tool-header">
      <h1>密码生成器</h1>
      <p class="tool-description">生成安全随机密码，支持自定义字符集、强度评估与批量生成</p>
    </header>

    <main class="tool-main">
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn btn-primary" data-action="generate">生成</button>
          <button class="btn btn-secondary" data-action="clear">清空</button>
        </div>
        <div class="toolbar-group">
          <button class="btn btn-sm btn-secondary" data-action="copy-all">复制全部</button>
        </div>
      </div>

      <div class="editor-container pwd-editor-container">
        <div class="editor-wrapper">
          <div class="editor-header">
            <span class="editor-title">配置</span>
          </div>
          <div class="editor-body pwd-config-body">
            <div class="pwd-config-group">
              <label class="pwd-config-label">密码长度：<strong id="pwd-length-value">16</strong></label>
              <input type="range" id="pwd-length" min="4" max="128" value="16" class="pwd-slider">
            </div>
            <div class="pwd-config-group">
              <label class="pwd-config-label">字符集</label>
              <div class="pwd-charset-options">
                <label class="pwd-checkbox"><input type="checkbox" id="chk-upper" checked><span>大写字母 A-Z</span></label>
                <label class="pwd-checkbox"><input type="checkbox" id="chk-lower" checked><span>小写字母 a-z</span></label>
                <label class="pwd-checkbox"><input type="checkbox" id="chk-digits" checked><span>数字 0-9</span></label>
                <label class="pwd-checkbox"><input type="checkbox" id="chk-symbols" checked><span>符号 !@#$%...</span></label>
              </div>
            </div>
            <div class="pwd-config-group">
              <label class="pwd-checkbox"><input type="checkbox" id="chk-exclude-ambiguous"><span>排除易混淆字符 (0 O o O l 1 I)</span></label>
            </div>
            <div class="pwd-config-group">
              <label class="pwd-config-label">自定义排除字符</label>
              <input type="text" id="pwd-exclude-chars" class="pwd-input" placeholder="如: {}[]|\"'">
            </div>
            <div class="pwd-config-group">
              <label class="pwd-config-label">生成数量</label>
              <div class="pwd-config-options" id="quantity-options">
                <button class="btn btn-sm btn-secondary is-active" data-qty="1">1</button>
                <button class="btn btn-sm btn-secondary" data-qty="5">5</button>
                <button class="btn btn-sm btn-secondary" data-qty="10">10</button>
                <button class="btn btn-sm btn-secondary" data-qty="20">20</button>
              </div>
            </div>
          </div>
        </div>

        <div class="editor-wrapper">
          <div class="editor-header">
            <span class="editor-title">生成结果</span>
            <span class="editor-info" id="pwd-count">0 条</span>
          </div>
          <div class="editor-body editor-output" id="pwd-result">
            <div class="placeholder">点击「生成」按钮创建密码</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils.js"></script>
  <script src="app.js"></script>
</body>
</html>

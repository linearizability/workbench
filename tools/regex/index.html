<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正则测试 - Workbench</title>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components/tool-layout.css">
  <link rel="stylesheet" href="../../assets/css/components/buttons.css">
  <link rel="stylesheet" href="../../assets/css/components/toolbar.css">
  <link rel="stylesheet" href="../../assets/css/components/editor.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tool-container">
    <header class="tool-header">
      <h1>正则测试</h1>
      <p class="tool-description">输入正则表达式，实时查看匹配结果与捕获组</p>
    </header>

    <main class="tool-main">
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn btn-secondary" data-action="sample">填入示例</button>
          <button class="btn btn-secondary" data-action="clear">清空</button>
        </div>
      </div>

      <div class="editor-container regex-editor-container">
        <!-- 左栏：配置 + 测试文本 -->
        <div class="editor-wrapper regex-left">
          <div class="regex-config">
            <div class="editor-header">
              <span class="editor-title">正则表达式</span>
            </div>
            <div class="regex-config-body">
              <div class="regex-pattern-bar">
                <span class="regex-delimiter">/</span>
                <input type="text" class="regex-pattern-input" id="regex-pattern" placeholder="输入正则表达式…" autocomplete="off" spellcheck="false">
                <span class="regex-delimiter">/</span>
                <div class="regex-flags">
                  <label class="regex-flag"><input type="checkbox" data-flag="g" checked><span>g</span></label>
                  <label class="regex-flag"><input type="checkbox" data-flag="i"><span>i</span></label>
                  <label class="regex-flag"><input type="checkbox" data-flag="m"><span>m</span></label>
                  <label class="regex-flag"><input type="checkbox" data-flag="s"><span>s</span></label>
                </div>
                <button class="btn btn-sm btn-secondary" data-action="copy-regex">复制</button>
              </div>
              <div class="regex-presets">
                <select class="regex-preset-select" id="regex-preset">
                  <option value="">常用正则预设…</option>
                  <option value="email">邮箱</option>
                  <option value="phone-cn">手机号（大陆）</option>
                  <option value="ipv4">IPv4 地址</option>
                  <option value="url">URL</option>
                  <option value="idcard">身份证号</option>
                  <option value="date-iso">日期（ISO）</option>
                  <option value="hex-color">十六进制颜色</option>
                  <option value="digits">纯数字</option>
                </select>
              </div>
            </div>
          </div>
          <div class="regex-test">
            <div class="editor-header">
              <span class="editor-title">测试文本</span>
            </div>
            <div class="editor-body">
              <textarea class="editor" id="regex-text" placeholder="输入要测试的文本…"></textarea>
            </div>
          </div>
        </div>

        <!-- 右栏：结果 -->
        <div class="editor-wrapper">
          <div class="editor-header">
            <span class="editor-title">匹配结果</span>
            <span class="editor-info" id="regex-status">0 处匹配</span>
          </div>
          <div class="editor-body editor-output" id="regex-result">
            <div class="placeholder">输入正则和测试文本查看结果…</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils.js"></script>
  <script src="app.js"></script>
</body>
</html>

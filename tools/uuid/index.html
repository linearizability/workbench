<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UUID 生成器 - Workbench</title>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components/tool-layout.css">
  <link rel="stylesheet" href="../../assets/css/components/buttons.css">
  <link rel="stylesheet" href="../../assets/css/components/toolbar.css">
  <link rel="stylesheet" href="../../assets/css/components/editor.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tool-container">
    <header class="tool-header">
      <h1>UUID 生成器</h1>
      <p class="tool-description">批量生成 UUID/GUID，支持格式转换与一键复制</p>
    </header>

    <main class="tool-main">
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn btn-primary" data-action="generate">生成</button>
          <button class="btn btn-secondary" data-action="clear">清空</button>
        </div>
        <div class="toolbar-group">
          <button class="btn btn-sm btn-secondary" data-action="copy-all">复制全部</button>
        </div>
      </div>

      <div class="editor-container uuid-editor-container">
        <div class="editor-wrapper">
          <div class="editor-header">
            <span class="editor-title">配置</span>
          </div>
          <div class="editor-body uuid-config-body">
            <div class="uuid-config-group">
              <label class="uuid-config-label">生成数量</label>
              <div class="uuid-config-options" id="quantity-options">
                <button class="btn btn-sm btn-secondary is-active" data-qty="1">1</button>
                <button class="btn btn-sm btn-secondary" data-qty="5">5</button>
                <button class="btn btn-sm btn-secondary" data-qty="10">10</button>
                <button class="btn btn-sm btn-secondary" data-qty="20">20</button>
              </div>
            </div>
            <div class="uuid-config-group">
              <label class="uuid-config-label">格式</label>
              <div class="uuid-config-options" id="format-options">
                <button class="btn btn-sm btn-secondary is-active" data-format="standard">标准</button>
                <button class="btn btn-sm btn-secondary" data-format="plain">纯文本</button>
              </div>
            </div>
            <div class="uuid-config-group">
              <label class="uuid-config-label">大小写</label>
              <div class="uuid-config-options" id="case-options">
                <button class="btn btn-sm btn-secondary is-active" data-case="lower">小写</button>
                <button class="btn btn-sm btn-secondary" data-case="upper">大写</button>
              </div>
            </div>
          </div>
        </div>

        <div class="editor-wrapper">
          <div class="editor-header">
            <span class="editor-title">生成结果</span>
            <span class="editor-info" id="uuid-count">0 条</span>
          </div>
          <div class="editor-body editor-output" id="uuid-result">
            <div class="placeholder">点击「生成」按钮创建 UUID</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils.js"></script>
  <script src="app.js"></script>
</body>
</html>

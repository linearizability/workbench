<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本对比 - Workbench</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components/tool-layout.css">
  <link rel="stylesheet" href="../assets/css/components/buttons.css">
  <link rel="stylesheet" href="../assets/css/components/toolbar.css">
  <link rel="stylesheet" href="../assets/css/components/editor.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tool-container">
    <header class="tool-header">
      <h1>文本对比</h1>
      <p class="tool-description">比较两段文本的差异，支持行级、词级、字符级对比</p>
    </header>

    <main class="tool-main">
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn btn-primary" data-action="compare">比较</button>
          <button class="btn btn-secondary" data-action="swap">交换</button>
          <button class="btn btn-secondary" data-action="clear">清空</button>
        </div>
        <div class="toolbar-group">
          <button class="btn btn-sm btn-secondary is-active" data-mode="lines">行级</button>
          <button class="btn btn-sm btn-secondary" data-mode="words">词级</button>
          <button class="btn btn-sm btn-secondary" data-mode="chars">字符级</button>
        </div>
      </div>

      <div class="editor-container diff-editor-container">
        <!-- 原始文本 -->
        <div class="editor-wrapper">
          <div class="editor-header">
            <span class="editor-title">原始文本</span>
            <div class="editor-header-actions">
              <button class="btn btn-sm btn-secondary" data-action="copy-old">复制</button>
            </div>
          </div>
          <div class="editor-body">
            <textarea class="editor" id="diff-old" placeholder="粘贴原始文本…"></textarea>
          </div>
        </div>

        <!-- 新文本 -->
        <div class="editor-wrapper">
          <div class="editor-header">
            <span class="editor-title">新文本</span>
            <div class="editor-header-actions">
              <button class="btn btn-sm btn-secondary" data-action="copy-new">复制</button>
            </div>
          </div>
          <div class="editor-body">
            <textarea class="editor" id="diff-new" placeholder="粘贴修改后的文本…"></textarea>
          </div>
        </div>

        <!-- 差异结果 -->
        <div class="editor-wrapper diff-result-wrapper">
          <div class="editor-header">
            <span class="editor-title">差异结果</span>
            <span class="editor-info" id="diff-info">点击「比较」查看差异</span>
          </div>
          <div class="editor-body editor-output" id="diff-result">
            <div class="placeholder">输入两侧文本并点击「比较」…</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/diff.min.js"></script>
  <script src="manifest.js"></script>
  <script src="core.js"></script>
  <script src="app.js"></script>
</body>
</html>

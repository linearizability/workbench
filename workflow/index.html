<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作流编排 - Workbench</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components/tool-layout.css">
  <link rel="stylesheet" href="../assets/css/components/buttons.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tool-container">
    <header class="tool-header">
      <h1>工作流编排</h1>
      <p class="tool-description">拖拽工具节点、连线、配置参数，构建自动化流程</p>
    </header>

    <main class="tool-main workflow-main">
      <!-- 左侧工具箱 -->
      <aside class="workflow-sidebar">
        <div class="workflow-sidebar-title">工具箱</div>
        <div class="workflow-tool-list" id="tool-list"></div>
      </aside>

      <!-- 中央画布 -->
      <div class="workflow-canvas-wrapper">
        <div class="workflow-toolbar">
          <!-- 第一行：主操作 + 自动执行 -->
          <div class="toolbar-row toolbar-row-primary">
            <div class="toolbar-group">
              <button class="btn btn-primary" data-action="run">运行</button>
              <button class="btn btn-secondary" data-action="clear">清空画布</button>
            </div>
            <div class="toolbar-group auto-run-group">
              <label class="auto-run-toggle" title="启用/停止自动执行">
                <input type="checkbox" id="auto-run-toggle">
                <span class="auto-run-label">自动执行</span>
              </label>
              <select id="auto-run-mode" class="auto-run-select">
                <option value="interval">间隔</option>
                <option value="cron">Cron</option>
              </select>
              <input type="text" id="auto-run-expr" class="auto-run-input" placeholder="5" value="5">
              <span id="auto-run-countdown" class="auto-run-countdown">已停止</span>
            </div>
          </div>

          <!-- 第二行：工作流管理 -->
          <div class="toolbar-row toolbar-row-secondary">
            <div class="toolbar-group">
              <select class="workflow-saved-select" id="workflow-saved-select">
                <option value="">已保存的工作流…</option>
              </select>
              <button class="btn btn-sm btn-secondary" data-action="save-local">保存</button>
              <button class="btn btn-sm btn-secondary" data-action="delete-local">删除</button>
            </div>
            <div class="toolbar-group">
              <button class="btn btn-sm btn-secondary" data-action="save">导出</button>
              <button class="btn btn-sm btn-secondary" data-action="load">导入</button>
            </div>
          </div>
        </div>

        <div class="workflow-canvas" id="workflow-canvas">
          <svg class="workflow-svg" id="workflow-svg"></svg>
          <div class="workflow-nodes" id="workflow-nodes"></div>
          <div class="workflow-hint">双击左侧工具添加到画布，拖拽端口连线</div>
        </div>
      </div>

      <!-- 右侧属性面板 -->
      <aside class="workflow-props" id="workflow-props">
        <div class="workflow-props-placeholder">选中节点以配置参数</div>
      </aside>
    </main>

    <!-- 底部面板：日志 + 结果 -->
    <div class="workflow-bottom" id="workflow-bottom">
      <div class="workflow-logs" id="workflow-logs">
        <div class="workflow-logs-header">
          <span>执行日志</span>
          <button class="btn btn-sm btn-secondary" data-action="clear-logs">清空</button>
        </div>
        <div class="workflow-logs-body" id="workflow-logs-body"></div>
      </div>
      <div class="workflow-results" id="workflow-results">
        <div class="workflow-results-header">
          <span>执行结果</span>
          <button class="btn btn-sm btn-secondary" data-action="clear-results">清空</button>
        </div>
        <div class="workflow-results-body" id="workflow-results-body">
          <div class="workflow-results-placeholder">运行工作流后，最终节点结果将显示在这里</div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/diff.min.js"></script>
  <script src="../assets/js/croner.umd.min.js"></script>
  <script src="../assets/js/tool-registry.js"></script>
  <script src="../assets/js/workflow-engine.js"></script>
  <script src="../tools/json/manifest.js"></script>
  <script src="../tools/diff/manifest.js"></script>
  <script src="../tools/http-request/manifest.js"></script>
  <script src="../tools/base64/manifest.js"></script>
  <script src="../tools/uuid/manifest.js"></script>
  <script src="../tools/md5/manifest.js"></script>
  <script src="../tools/url/manifest.js"></script>
  <script src="../tools/jwt/manifest.js"></script>
  <script src="../tools/timestamp/manifest.js"></script>
  <script src="../tools/cron/manifest.js"></script>
  <script src="../tools/qrcode/manifest.js"></script>
  <script src="../tools/regex/manifest.js"></script>
  <script src="../tools/file-generator/manifest.js"></script>
  <script src="../tools/image-generator/manifest.js"></script>
  <script src="../tools/properties-yaml/manifest.js"></script>
  <script src="../tools/svg-editor/manifest.js"></script>
  <script src="../tools/json-to-struct/manifest.js"></script>
  <script src="../notepad/manifest.js"></script>
  <script src="../links/manifest.js"></script>
  <script src="app.js"></script>
</body>
</html>

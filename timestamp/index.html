<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时间戳转换 - Workbench</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components/tool-layout.css">
  <link rel="stylesheet" href="../assets/css/components/buttons.css">
  <link rel="stylesheet" href="../assets/css/components/toolbar.css">
  <link rel="stylesheet" href="../assets/css/components/card.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tool-container">
    <header class="tool-header">
      <h1>时间戳转换</h1>
      <p class="tool-description">时间戳与日期互转，实时获取当前时间戳</p>
    </header>

    <main class="tool-main">
      <!-- 实时时间戳 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">当前时间戳</h2>
          <button class="btn btn-sm btn-secondary" id="btn-pause" data-action="pause">暂停</button>
        </div>
        <div class="card-body">
          <div class="ts-live">
            <div class="ts-live-row">
              <span class="ts-live-label">秒级</span>
              <code class="ts-live-value" id="live-seconds">-</code>
              <button class="btn btn-sm btn-secondary" data-action="copy-seconds">复制</button>
            </div>
            <div class="ts-live-row">
              <span class="ts-live-label">毫秒级</span>
              <code class="ts-live-value" id="live-millis">-</code>
              <button class="btn btn-sm btn-secondary" data-action="copy-millis">复制</button>
            </div>
            <div class="ts-live-row">
              <span class="ts-live-label">日期</span>
              <code class="ts-live-value ts-live-date" id="live-date">-</code>
            </div>
          </div>
        </div>
      </div>

      <!-- 时间戳 → 日期 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">时间戳 → 日期</h2>
        </div>
        <div class="card-body">
          <div class="ts-convert-section">
            <div class="ts-input-row">
              <input type="text" id="ts-input" class="form-input" placeholder="输入时间戳，如 1714032000 或 1714032000000">
              <div class="select-wrapper">
                <select id="ts-unit">
                  <option value="auto">自动识别</option>
                  <option value="seconds">秒</option>
                  <option value="millis">毫秒</option>
                </select>
              </div>
              <button class="btn btn-primary" id="btn-ts-to-date">转换</button>
            </div>
            <div id="ts-result" class="ts-result" style="display:none;">
              <div class="ts-result-item">
                <span class="ts-result-label">本地时间</span>
                <code id="ts-result-local">-</code>
              </div>
              <div class="ts-result-item">
                <span class="ts-result-label">UTC 时间</span>
                <code id="ts-result-utc">-</code>
              </div>
              <div class="ts-result-item">
                <span class="ts-result-label">ISO 8601</span>
                <code id="ts-result-iso">-</code>
              </div>
              <div class="ts-result-item">
                <span class="ts-result-label">相对时间</span>
                <code id="ts-result-relative">-</code>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 日期 → 时间戳 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">日期 → 时间戳</h2>
        </div>
        <div class="card-body">
          <div class="ts-convert-section">
            <div class="ts-input-row">
              <input type="datetime-local" id="date-input" class="form-input" step="1">
              <button class="btn btn-primary" id="btn-date-to-ts">转换</button>
            </div>
            <div class="ts-now-actions">
              <button class="btn btn-sm btn-secondary" data-action="fill-now">填入当前时间</button>
            </div>
            <div id="date-result" class="ts-result" style="display:none;">
              <div class="ts-result-item">
                <span class="ts-result-label">秒级时间戳</span>
                <code id="date-result-seconds">-</code>
                <button class="btn btn-sm btn-secondary" data-action="copy-date-seconds">复制</button>
              </div>
              <div class="ts-result-item">
                <span class="ts-result-label">毫秒级时间戳</span>
                <code id="date-result-millis">-</code>
                <button class="btn btn-sm btn-secondary" data-action="copy-date-millis">复制</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
